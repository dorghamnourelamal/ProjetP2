<div class="card mb-3 shadow-sm">
  <img [src]="enseignant.photo" class="card-img-top" alt="photo enseignant">

  <div class="card-body">
    <h5 class="card-title">
      {{ enseignant.prenom }} {{ enseignant.nom }}
    </h5>

    <p class="card-text">
      <strong>Email :</strong> {{ enseignant.email }} <br>
      <strong>Téléphone :</strong> {{ enseignant.telephone }} <br>
      <strong>Bureau :</strong> {{ enseignant.bureau }} <br>
      <strong>Laboratoire :</strong> {{ enseignant.laboratoire }}
    </p>

    <a [href]="enseignant.researchGate" target="_blank" class="btn btn-success btn-sm">
      ResearchGate
    </a>
  </div>
</div>
