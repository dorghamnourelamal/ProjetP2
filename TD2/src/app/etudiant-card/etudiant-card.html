<div class="card mb-3 shadow-sm">
  <img [src]="etudiant.photo" class="card-img-top" alt="photo étudiant">

  <div class="card-body">
    <h5 class="card-title">
      {{ etudiant.prenom }} {{ etudiant.nom }}
    </h5>

    <p class="card-text">
      <strong>Email :</strong> {{ etudiant.email }} <br>
      <strong>Téléphone :</strong> {{ etudiant.telephone }}
    </p>

    <a [href]="etudiant.linkedin" target="_blank" class="btn btn-primary btn-sm me-2">
      LinkedIn
    </a>

    <a [href]="etudiant.alumni" target="_blank" class="btn btn-secondary btn-sm">
      Alumni
    </a>
  </div>
</div>
