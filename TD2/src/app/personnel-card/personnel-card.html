<div class="card mb-3 shadow-sm">
  <img [src]="personnel.photo" class="card-img-top" alt="photo personnel">

  <div class="card-body">
    <h5 class="card-title">
      {{ personnel.prenom }} {{ personnel.nom }}
    </h5>

    <p class="card-text">
      <strong>Email :</strong> {{ personnel.email }} <br>
      <strong>Téléphone :</strong> {{ personnel.telephone }} <br>
      <strong>Bureau :</strong> {{ personnel.bureau }} <br>
      <strong>Service :</strong> {{ personnel.service }}
    </p>

    <a [href]="personnel.twitter" target="_blank" class="btn btn-dark btn-sm">
      Compte X
    </a>
  </div>
</div>
